<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'">
  <title>Claude Cheatsheet</title>
  <script>
    /* No-Flash-Pattern (Phase C-2 Idee #7):
       Liest das persistierte Theme aus localStorage BEVOR CSS evaluiert wird,
       um FOUC (Flash of Unstyled Content) beim Pageload zu verhindern.
       Inline + synchron (kein defer/async) — sonst greift es nach dem ersten Paint.
       try/catch fuer Privacy-Mode / Storage-blocked-Browser (Default = Dark). */
    (function () {
      try {
        var t = localStorage.getItem('cheatsheet:theme:v1');
        if (t === 'light') {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      } catch (e) {
        /* localStorage blocked -> Default Dark, ok */
      }
    })();
  </script>
  <style>
    :root {
      --bg: #0d1117;
      --bg-secondary: #161b22;
      --bg-tertiary: #21262d;
      --text: #e6edf3;
      /* B1-Fix (UI/UX-Blocker): Neuer Token fuer Badges/Tags.
         --text-muted #8b949e auf bg-tertiary #21262d ergibt 3.85:1 (FAIL WCAG AA).
         --text-secondary #c9d1d9 ergibt 7.8:1 (AAA). */
      --text-secondary: #c9d1d9;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79c0ff;
      --border: #30363d;
      --green: #3fb950;
      --yellow: #d29922;
      --red: #f85149;
      --violet: #bc8cff;
      --orange: #f0883e;
    }

    /* Light-Mode (Phase C-2 Idee #7) — Aktivierung via [data-theme="light"]
       auf <html>. 14 Pendants zu den Dark-Tokens. Alle Text-Kontraste
       gegen die jeweiligen Hintergruende >= 4.5:1 (WCAG AA), die meisten
       AAA. --border ist dokumentierte Ausnahme (WCAG SC 1.4.11):
       bordered Components haben zusaetzliche Background-Differenz und
       der Focus-State wechselt auf --accent (7.13:1). Siehe UI/UX-Spec
       v0.5.0-light-palette.md Sektion 1. */
    [data-theme="light"] {
      --bg: #ffffff;
      --bg-secondary: #f6f8fa;
      --bg-tertiary: #eaeef2;
      --text: #1f2328;
      --text-secondary: #3d444d;
      --text-muted: #59636e;
      --accent: #0550ae;
      --accent-hover: #033d8b;
      --border: #d1d9e0;
      --green: #116329;
      --yellow: #7d4e00;
      --red: #a40e26;
      --violet: #6639ba;
      --orange: #9a3412;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }

    /* B2-Fix (UI/UX-Blocker): Globale sichtbare Focus-States fuer Keyboard-User.
       outline-offset: 2px vermeidet Kollision mit bestehender Border. */
    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      border-radius: inherit;
    }
    :focus:not(:focus-visible) { outline: none; }

    /* Skip-Link (Keyboard-User springen zur Liste) */
    .skip-link {
      position: absolute;
      left: -10000px;
      top: auto;
      width: 1px;
      height: 1px;
      overflow: hidden;
    }
    .skip-link:focus {
      left: 16px;
      top: 16px;
      width: auto;
      height: auto;
      padding: 8px 12px;
      background: var(--accent);
      color: var(--bg);
      border-radius: 4px;
      z-index: 1000;
      font-weight: 600;
      text-decoration: none;
    }

    header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    header h1 { font-size: 20px; font-weight: 600; }
    .stats {
      display: flex;
      gap: 16px;
      font-size: 13px;
      color: var(--text-secondary);
      flex-wrap: wrap;
    }
    .stats span { color: var(--accent); font-weight: 600; }

    /* Theme-Toggle-Button (Phase C-2 Idee #7) — Sun/Moon im Header.
       18x18 SVG Icon in 36x36 Button-Padding. Hover-State konsistent mit
       .filter-btn:hover. Focus-State via globalem :focus-visible-Block. */
    .theme-toggle-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      padding: 0;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: background-color 0.15s, color 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    .theme-toggle-btn:hover {
      background: var(--bg-tertiary);
      color: var(--text);
    }
    .theme-toggle-btn svg {
      width: 18px;
      height: 18px;
      display: block;
    }

    main { max-width: 1200px; margin: 0 auto; padding: 24px; }

    /* Suggest-Box */
    .suggest-box {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 24px;
    }
    .suggest-box h2 { font-size: 16px; margin-bottom: 12px; }
    .suggest-input {
      display: flex;
      gap: 8px;
    }
    .suggest-input input {
      flex: 1;
      padding: 10px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 14px;
      outline: none;
    }
    .suggest-input input:focus { border-color: var(--accent); }
    .suggest-input button {
      padding: 10px 20px;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .suggest-input button:hover { background: var(--accent-hover); }
    .suggest-input button:active { transform: scale(0.98); transition: transform 60ms; }

    .suggest-results {
      margin-top: 16px;
      display: none;
    }
    .suggest-results.active { display: block; }
    .suggestion-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 6px;
      background: var(--bg);
      margin-bottom: 6px;
      cursor: pointer;
      border: 1px solid transparent;
    }
    .suggestion-item:hover { background: var(--bg-tertiary); border-color: var(--border); }

    .relevance-bar {
      width: 40px;
      height: 6px;
      background: var(--bg-tertiary);
      border-radius: 3px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .relevance-bar-fill {
      height: 100%;
      background: var(--green);
      border-radius: 3px;
    }
    .suggestion-name { font-weight: 600; font-size: 14px; }
    .suggestion-reason { font-size: 12px; color: var(--text-secondary); }

    /* Controls */
    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .search-input {
      flex: 1;
      min-width: 200px;
      padding: 8px 12px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 14px;
      outline: none;
    }
    .search-input:focus { border-color: var(--accent); }
    .filter-btn {
      padding: 6px 14px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-secondary);
      font-size: 13px;
      cursor: pointer;
    }
    .filter-btn:hover { border-color: var(--text-secondary); }
    .filter-btn.active,
    .filter-btn[aria-pressed="true"] {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }

    /* Entry-Liste */
    .entry-list { display: flex; flex-direction: column; gap: 4px; }
    .entry-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .entry-item:hover { border-color: var(--accent); }

    /* Favoriten- / Recent-Sektionen + Stern-Button (Phase B Idee #6) */
    .favorites-section,
    .recent-section {
      margin-bottom: 20px;
    }
    .favorites-section h2,
    .recent-section h2 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .favorite-btn {
      background: none;
      border: none;
      padding: 4px;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 16px;
      line-height: 1;
      border-radius: 4px;
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s;
    }
    .favorite-btn:hover { color: var(--yellow); }
    .favorite-btn[aria-pressed="true"] { color: var(--yellow); }
    .favorite-btn .favorite-icon { display: inline-block; width: 16px; height: 16px; }
    /* Stale-Eintrag (ID nicht mehr im Index): gedimmt, nicht klickbar wirkend */
    .entry-item.is-stale {
      opacity: 0.55;
      cursor: not-allowed;
    }
    .entry-item.is-stale:hover { border-color: var(--border); }

    .entry-kind {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 4px;
      background: var(--bg-tertiary);
      /* B1-Fix: war --text-muted (3.85:1 FAIL) — jetzt --text-secondary (7.8:1 AAA) */
      color: var(--text-secondary);
      min-width: 80px;
      text-align: center;
      flex-shrink: 0;
    }
    .entry-kind.skill { color: var(--accent); }
    .entry-kind.command { color: var(--green); }
    .entry-kind.agent { color: var(--yellow); }
    .entry-kind.mcp_tool { color: var(--red); }
    .entry-kind.hook { color: var(--violet); }
    .entry-kind.role { color: var(--orange); }
    .entry-kind.cli_command { color: var(--accent-hover); }

    .entry-name { font-weight: 600; font-size: 14px; min-width: 240px; }
    .entry-desc {
      font-size: 13px;
      color: var(--text-secondary);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .entry-tags { display: flex; gap: 4px; flex-wrap: wrap; }
    .tag {
      font-size: 11px;
      padding: 1px 6px;
      border-radius: 3px;
      background: var(--bg-tertiary);
      /* B1-Fix: AAA-Kontrast auf bg-tertiary */
      color: var(--text-secondary);
    }

    /* Empty-States (Phase C-2 Idee #7) — 3 Varianten:
       Index leer / Filter leer / Suche leer. Center-aligned, Headline +
       Sub-Text + CTA. Code-Inline mit bg-tertiary. */
    .empty-state {
      text-align: center;
      padding: 48px 16px;
      color: var(--text-secondary);
      font-size: 14px;
    }
    .empty-state h2 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }
    .empty-state p { margin-bottom: 12px; }
    .empty-state code {
      background: var(--bg-tertiary);
      padding: 1px 6px;
      border-radius: 3px;
      font-family: 'SF Mono', Monaco, Consolas, monospace;
      font-size: 12px;
      color: var(--text);
    }
    .empty-state .empty-cta {
      display: inline-block;
      margin-top: 4px;
      padding: 6px 14px;
      background: transparent;
      border: 1px solid var(--accent);
      border-radius: 6px;
      color: var(--accent);
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
    }
    .empty-state .empty-cta:hover {
      background: var(--accent);
      color: var(--bg);
    }
    .empty-state .empty-cta + .empty-cta { margin-left: 8px; }

    /* Detail-Panel */
    .detail-panel {
      display: none;
      position: fixed;
      top: 0;
      right: 0;
      width: 500px;
      max-width: 100vw;
      height: 100vh;
      background: var(--bg-secondary);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      padding: 24px;
      z-index: 100;
    }
    .detail-panel.open { display: block; }
    .detail-close {
      float: right;
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      line-height: 1;
    }
    .detail-close:hover { color: var(--text); background: var(--bg-tertiary); }
    .detail-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
    .detail-meta {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 16px;
      line-height: 1.8;
    }
    .detail-meta strong { color: var(--text); }
    .detail-content {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
      font-family: 'SF Mono', Monaco, Consolas, 'Courier New', monospace;
      font-size: 12px;
      white-space: pre-wrap;
      overflow-x: auto;
      max-height: 60vh;
      color: var(--text);
    }
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 99;
    }
    .overlay.open { display: block; }

    /* Error-Banner */
    .error-banner {
      background: var(--red);
      color: #ffffff;
      padding: 10px 16px;
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 14px;
      display: none;
    }
    .error-banner.active { display: block; }

    /* Responsive: F4 Stats-Wrap, F5 Panel full-width, Filter/Entry stack */
    @media (max-width: 640px) {
      main { padding: 16px; }
      .detail-panel { width: 100vw; padding: 16px; }
      .controls { flex-direction: column; align-items: stretch; }
      .search-input { min-width: 0; width: 100%; }
      .entry-item { flex-wrap: wrap; }
      .entry-name { min-width: 0; }
      .entry-desc { white-space: normal; }
    }

    /* F1 Prefers-reduced-motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition: none !important;
        animation: none !important;
      }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#entry-list">Zur Liste springen</a>

  <header>
    <h1>Claude Cheatsheet</h1>
    <div class="stats" id="stats" aria-live="polite"></div>
    <button
      type="button"
      id="theme-toggle"
      class="theme-toggle-btn"
      aria-label="Helles Design aktivieren"
      aria-pressed="false"
    >
      <span class="theme-icon" id="theme-icon" aria-hidden="true">
        <!-- Lucide "sun" SVG (Default: Dark aktiv -> Sun zeigen = wechselt zu Light) -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4"></circle>
          <path d="M12 2v2"></path>
          <path d="M12 20v2"></path>
          <path d="m4.93 4.93 1.41 1.41"></path>
          <path d="m17.66 17.66 1.41 1.41"></path>
          <path d="M2 12h2"></path>
          <path d="M20 12h2"></path>
          <path d="m6.34 17.66-1.41 1.41"></path>
          <path d="m19.07 4.93-1.41 1.41"></path>
        </svg>
      </span>
    </button>
  </header>

  <main id="main">
    <div class="error-banner" id="error-banner" role="alert"></div>

    <section class="suggest-box" aria-labelledby="suggest-heading">
      <h2 id="suggest-heading">Was moechtest du tun?</h2>
      <div class="suggest-input">
        <input
          type="text"
          id="suggest-input"
          placeholder="z.B. PR reviewen, Bug fixen, Feature planen..."
          aria-label="Aufgabe beschreiben"
          autocomplete="off"
        >
        <button type="button" id="suggest-btn">Suggest</button>
      </div>
      <div
        class="suggest-results"
        id="suggest-results"
        role="region"
        aria-label="Vorschlaege"
        aria-live="polite"
      ></div>
    </section>

    <section
      class="favorites-section"
      id="favorites-section"
      aria-labelledby="favorites-heading"
      hidden
    >
      <h2 id="favorites-heading">Favoriten</h2>
      <div
        class="entry-list"
        id="favorites-list"
        aria-label="Favorisierte Eintraege"
      ></div>
    </section>

    <section
      class="recent-section"
      id="recent-section"
      aria-labelledby="recent-heading"
      hidden
    >
      <h2 id="recent-heading">Zuletzt geoeffnet</h2>
      <div
        class="entry-list"
        id="recent-list"
        aria-label="Zuletzt geoeffnete Eintraege"
      ></div>
    </section>

    <section class="controls" aria-label="Filter und Suche">
      <input
        type="text"
        class="search-input"
        id="search-input"
        placeholder="Suche..."
        aria-label="Eintraege durchsuchen"
        autocomplete="off"
      >
      <button type="button" class="filter-btn active" data-kind="all" aria-pressed="true">Alle</button>
      <button type="button" class="filter-btn" data-kind="skill" aria-pressed="false">Skills</button>
      <button type="button" class="filter-btn" data-kind="command" aria-pressed="false">Commands</button>
      <button type="button" class="filter-btn" data-kind="agent" aria-pressed="false">Agents</button>
      <button type="button" class="filter-btn" data-kind="mcp_tool" aria-pressed="false">MCP</button>
      <button type="button" class="filter-btn" data-kind="hook" aria-pressed="false">Hooks</button>
      <button type="button" class="filter-btn" data-kind="role" aria-pressed="false">Roles</button>
      <button type="button" class="filter-btn" data-kind="cli_command" aria-pressed="false">CLI</button>
    </section>

    <section
      class="entry-list"
      id="entry-list"
      aria-label="Eintraege"
      aria-live="polite"
    ></section>
  </main>

  <div
    class="overlay"
    id="overlay"
    aria-hidden="true"
  ></div>

  <aside
    class="detail-panel"
    id="detail-panel"
    role="dialog"
    aria-modal="true"
    aria-labelledby="detail-title"
    aria-hidden="true"
    tabindex="-1"
  >
    <button
      type="button"
      class="detail-close"
      id="detail-close"
      aria-label="Detail-Panel schliessen"
    >&times;</button>
    <div id="detail-content"></div>
  </aside>

  <script>
    'use strict';

    /* ------------------------------------------------------------------ *
     * XSS-Escape-Helper (Pflicht gem. Rolle v2.2 / Bedarfsanalyse W3)
     * Alle interpolierten Werte (name, description, tags, source,
     * filePath, id, content, reason, kind, scope) laufen durch escHtml.
     * ------------------------------------------------------------------ */
    function escHtml(value) {
      const div = document.createElement('div');
      div.textContent = value == null ? '' : String(value);
      return div.innerHTML;
    }

    /* ------------------------------------------------------------------ *
     * KIND_LABELS — Singular-Form fuer Empty-State-Anzeige.
     * Filter-Buttons zeigen Plural ("Skills", "Commands"), Empty-States
     * verwenden Singular ("Keine Skill-Eintraege ..."). Quelle: UI/UX-Spec
     * v0.5.0-light-palette.md Sektion 3.
     * ------------------------------------------------------------------ */
    const KIND_LABELS = {
      skill: 'Skill',
      command: 'Slash-Command',
      agent: 'Agent',
      hook: 'Hook',
      mcp_tool: 'MCP-Tool',
      role: 'Jarvis-Rolle',
      cli_command: 'CLI-Befehl',
    };

    /* ------------------------------------------------------------------ */
    /* State                                                              */
    /* ------------------------------------------------------------------ */
    let allEntries = [];
    let currentFilter = 'all';
    let searchTimer = null;
    let lastTriggerElement = null;

    /* ------------------------------------------------------------------ */
    /* Favoriten + Recent (Phase B Idee #6) — pure localStorage           */
    /* ------------------------------------------------------------------ */
    const FAV_KEY = 'cheatsheet:favorites:v1';
    const RECENT_KEY = 'cheatsheet:recent:v1';
    const RECENT_CAP = 10;

    function readList(key) {
      try {
        const raw = localStorage.getItem(key);
        if (!raw) return [];
        const arr = JSON.parse(raw);
        return Array.isArray(arr) ? arr.filter((x) => typeof x === 'string') : [];
      } catch (_e) {
        // Quota-Exhaustion, Private-Mode, JSON-Parse-Fail: silent degrade
        return [];
      }
    }

    function writeList(key, list) {
      try {
        localStorage.setItem(key, JSON.stringify(list));
      } catch (_e) {
        // Quota-Exhaustion / Private-Mode: silent degrade (kein State-Bruch)
      }
    }

    function isFavorite(id) {
      if (!id) return false;
      return readList(FAV_KEY).indexOf(id) !== -1;
    }

    function toggleFavorite(id) {
      if (!id) return;
      const list = readList(FAV_KEY);
      const idx = list.indexOf(id);
      if (idx === -1) {
        list.push(id);
      } else {
        list.splice(idx, 1);
      }
      writeList(FAV_KEY, list);
      // Re-Render: Favoriten-Sektion + Main-Liste (Stern-Status aktualisieren)
      renderFavorites();
      applyFilters();
    }

    function pushRecent(id) {
      if (!id) return;
      const list = readList(RECENT_KEY).filter((x) => x !== id);
      list.unshift(id);
      if (list.length > RECENT_CAP) list.length = RECENT_CAP;
      writeList(RECENT_KEY, list);
      renderRecent();
    }

    /* ------------------------------------------------------------------ */
    /* Theme-Toggle (Phase C-2 Idee #7) — localStorage-persistiert.       */
    /* No-Flash bereits im <head>-Inline-Script behandelt.                 */
    /* ------------------------------------------------------------------ */
    const THEME_KEY = 'cheatsheet:theme:v1';

    // Lucide-SVG-Pfade (18x18 stroke 2). Ein Icon zur Zeit sichtbar:
    // Dark aktiv  -> Sun-Icon  (Klick wechselt zu Light)
    // Light aktiv -> Moon-Icon (Klick wechselt zu Dark)
    const SUN_SVG =
      '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"' +
      ' stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
      '<circle cx="12" cy="12" r="4"></circle>' +
      '<path d="M12 2v2"></path><path d="M12 20v2"></path>' +
      '<path d="m4.93 4.93 1.41 1.41"></path><path d="m17.66 17.66 1.41 1.41"></path>' +
      '<path d="M2 12h2"></path><path d="M20 12h2"></path>' +
      '<path d="m6.34 17.66-1.41 1.41"></path><path d="m19.07 4.93-1.41 1.41"></path>' +
      '</svg>';
    const MOON_SVG =
      '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"' +
      ' stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
      '<path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>' +
      '</svg>';

    function readTheme() {
      try {
        const t = localStorage.getItem(THEME_KEY);
        return t === 'light' ? 'light' : 'dark';
      } catch (_e) {
        return 'dark';
      }
    }

    function writeTheme(theme) {
      try {
        localStorage.setItem(THEME_KEY, theme);
      } catch (_e) {
        /* Quota / Private-Mode: silent degrade */
      }
    }

    function applyTheme(theme) {
      const html = document.documentElement;
      if (theme === 'light') {
        html.setAttribute('data-theme', 'light');
      } else {
        html.removeAttribute('data-theme');
      }
      const btn = document.getElementById('theme-toggle');
      const icon = document.getElementById('theme-icon');
      if (!btn || !icon) return;
      if (theme === 'light') {
        // Light aktiv -> Moon-Icon (= wohin der Klick wechselt), Button-Label "Dunkles ..."
        icon.innerHTML = MOON_SVG;
        btn.setAttribute('aria-label', 'Dunkles Design aktivieren');
        btn.setAttribute('aria-pressed', 'true');
      } else {
        icon.innerHTML = SUN_SVG;
        btn.setAttribute('aria-label', 'Helles Design aktivieren');
        btn.setAttribute('aria-pressed', 'false');
      }
    }

    function toggleTheme() {
      const next = readTheme() === 'light' ? 'dark' : 'light';
      writeTheme(next);
      applyTheme(next);
    }

    /* ------------------------------------------------------------------ */
    /* DOM-Refs                                                           */
    /* ------------------------------------------------------------------ */
    const $stats = document.getElementById('stats');
    const $entryList = document.getElementById('entry-list');
    const $searchInput = document.getElementById('search-input');
    const $suggestInput = document.getElementById('suggest-input');
    const $suggestResults = document.getElementById('suggest-results');
    const $suggestBtn = document.getElementById('suggest-btn');
    const $detailPanel = document.getElementById('detail-panel');
    const $detailContent = document.getElementById('detail-content');
    const $detailClose = document.getElementById('detail-close');
    const $overlay = document.getElementById('overlay');
    const $errorBanner = document.getElementById('error-banner');
    const $favoritesSection = document.getElementById('favorites-section');
    const $favoritesList = document.getElementById('favorites-list');
    const $recentSection = document.getElementById('recent-section');
    const $recentList = document.getElementById('recent-list');

    /* ------------------------------------------------------------------ */
    /* Error-UI                                                           */
    /* ------------------------------------------------------------------ */
    function showError(message) {
      $errorBanner.textContent = message;
      $errorBanner.classList.add('active');
    }
    function clearError() {
      $errorBanner.classList.remove('active');
      $errorBanner.textContent = '';
    }

    /* ------------------------------------------------------------------ */
    /* Init                                                               */
    /* ------------------------------------------------------------------ */
    async function init() {
      try {
        const [entriesRes, statsRes] = await Promise.all([
          fetch('/api/entries'),
          fetch('/api/stats'),
        ]);
        if (!entriesRes.ok) throw new Error('Eintraege konnten nicht geladen werden (' + entriesRes.status + ')');
        if (!statsRes.ok) throw new Error('Stats konnten nicht geladen werden (' + statsRes.status + ')');
        const entries = await entriesRes.json();
        const stats = await statsRes.json();
        allEntries = Array.isArray(entries) ? entries : [];
        renderStats(stats);
        renderEntries(allEntries);
        renderFavorites();
        renderRecent();
        clearError();
      } catch (err) {
        showError('Fehler beim Laden: ' + (err && err.message ? err.message : String(err)));
      }
    }

    /* ------------------------------------------------------------------ */
    /* Render: Stats                                                       */
    /* ------------------------------------------------------------------ */
    function renderStats(stats) {
      if (!stats || typeof stats !== 'object') {
        $stats.textContent = '';
        return;
      }
      const total = typeof stats.total === 'number' ? stats.total : 0;
      const byKind = stats.byKind && typeof stats.byKind === 'object' ? stats.byKind : {};
      const parts = Object.keys(byKind).map((k) => {
        return escHtml(k) + ': <span>' + escHtml(byKind[k]) + '</span>';
      });
      let html = 'Total: <span>' + escHtml(total) + '</span>';
      if (parts.length > 0) html += ' | ' + parts.join(' | ');
      $stats.innerHTML = html;
    }

    /* ------------------------------------------------------------------ */
    /* Render: Entries                                                     */
    /* ------------------------------------------------------------------ */
    function entryItemHtml(e, opts) {
      const stale = !!(opts && opts.stale);
      const kind = e && e.kind ? e.kind : (e && e.id ? String(e.id).split(':')[0] : 'unknown');
      const name = e && e.name ? e.name : (stale && e && e.id ? e.id : '');
      const desc = e && e.description ? String(e.description).slice(0, 140) : (stale ? 'Eintrag nicht mehr im Index' : '');
      const tags = Array.isArray(e && e.tags) ? e.tags : [];
      const id = e && e.id ? e.id : '';
      const fav = isFavorite(id);
      const tagsHtml = tags.map((t) => '<span class="tag">' + escHtml(t) + '</span>').join('');
      // Stern-Button: aria-pressed reflektiert Status; aria-label switcht Verb (Add/Remove)
      const favLabel = fav ? 'Favorit entfernen' : 'Favorit hinzufuegen';
      const favIcon = fav ? '★' : '☆'; // U+2605 (filled) / U+2606 (outlined)
      const favBtn =
        '<button class="favorite-btn" type="button"' +
        ' data-id="' + escHtml(id) + '"' +
        ' aria-pressed="' + (fav ? 'true' : 'false') + '"' +
        ' aria-label="' + escHtml(favLabel) + '">' +
          '<span class="favorite-icon" aria-hidden="true">' + favIcon + '</span>' +
        '</button>';
      const itemClass = 'entry-item' + (stale ? ' is-stale' : '');
      const ariaDisabled = stale ? ' aria-disabled="true"' : '';
      const tabIndex = stale ? '-1' : '0';
      return (
        '<article class="' + itemClass + '" role="button" tabindex="' + tabIndex + '"' +
        ' data-id="' + escHtml(id) + '"' + ariaDisabled +
        ' aria-label="Details fuer ' + escHtml(name) + ' oeffnen">' +
          favBtn +
          '<div class="entry-kind ' + escHtml(kind) + '">' + escHtml(kind) + '</div>' +
          '<div class="entry-name">' + escHtml(name) + '</div>' +
          '<div class="entry-desc">' + escHtml(desc) + '</div>' +
          '<div class="entry-tags">' + tagsHtml + '</div>' +
        '</article>'
      );
    }

    /* Empty-States (Phase C-2 Idee #7) — 3 Varianten gemaess UI/UX-Spec.
       XSS-Schutz: query und kind laufen durch escHtml. Buttons haben
       data-action fuer Event-Delegation (Reset-Filter / Suche leeren). */
    function emptyStateIndexEmptyHtml() {
      return (
        '<div class="empty-state" role="status">' +
          '<h2>Dein Katalog ist leer.</h2>' +
          '<p>Es wurden keine Plugins, Skills oder Hooks erkannt.</p>' +
          '<p>Installiere ein Plugin mit <code>/plugin install &lt;name&gt;</code> und lade das Dashboard neu.</p>' +
        '</div>'
      );
    }

    function emptyStateFilterEmptyHtml(kind) {
      const label = KIND_LABELS[kind] || kind || 'Eintrag';
      return (
        '<div class="empty-state" role="status">' +
          '<h2>Keine ' + escHtml(label) + '-Eintraege gefunden.</h2>' +
          '<p>Mit dem aktiven Filter gibt es nichts zu zeigen. Vielleicht bringt ein anderes Plugin diese Art Eintrag mit.</p>' +
          '<button type="button" class="empty-cta" data-action="reset-filter">Filter zuruecksetzen</button>' +
        '</div>'
      );
    }

    function emptyStateSearchEmptyHtml(query, filterKind) {
      const filterActive = filterKind && filterKind !== 'all';
      const filterLabel = filterActive ? (KIND_LABELS[filterKind] || filterKind) : '';
      const subText = filterActive
        ? 'Probier einen anderen Suchbegriff oder entferne den Filter "' + escHtml(filterLabel) + '", um den ganzen Katalog zu durchsuchen.'
        : 'Probier einen anderen Suchbegriff oder nutze die Filter-Buttons.';
      const extraCta = filterActive
        ? '<button type="button" class="empty-cta" data-action="reset-all">Filter und Suche zuruecksetzen</button>'
        : '';
      return (
        '<div class="empty-state" role="status">' +
          '<h2>Keine Treffer fuer <code>"' + escHtml(query) + '"</code>.</h2>' +
          '<p>' + subText + '</p>' +
          '<button type="button" class="empty-cta" data-action="reset-search">Suche leeren</button>' +
          extraCta +
        '</div>'
      );
    }

    function renderEntries(entries, opts) {
      const o = opts || {};
      if (!entries || entries.length === 0) {
        // Reihenfolge der Checks ist wichtig:
        // 1) Index global leer -> Variante 1
        // 2) Suche aktiv (mit/ohne Filter) -> Variante 3
        // 3) Filter aktiv ohne Suche -> Variante 2
        // 4) Fallback (nichts aktiv, aber leer) -> Variante 1
        let html;
        if (allEntries.length === 0) {
          html = emptyStateIndexEmptyHtml();
        } else if (o.query && o.query.length > 0) {
          html = emptyStateSearchEmptyHtml(o.query, o.filterKind);
        } else if (o.filterKind && o.filterKind !== 'all') {
          html = emptyStateFilterEmptyHtml(o.filterKind);
        } else {
          html = emptyStateIndexEmptyHtml();
        }
        $entryList.innerHTML = html;
        return;
      }
      const html = entries.map((e) => entryItemHtml(e, { stale: false })).join('');
      $entryList.innerHTML = html;
    }

    /* ------------------------------------------------------------------ */
    /* Render: Favoriten + Recent (Phase B)                                */
    /* WICHTIG: KEIN Write-Back beim Render (Plan-Reviewer-Risiko 4).      */
    /* Stale-IDs werden gedimmt rendered, NICHT aus localStorage entfernt. */
    /* ------------------------------------------------------------------ */
    function entriesById(ids) {
      // Map id -> entry; behaelt Reihenfolge der IDs, markiert stale IDs.
      return ids.map((id) => {
        const found = allEntries.find((e) => e && e.id === id);
        if (found) return { entry: found, stale: false };
        return { entry: { id: id, name: id, description: '', kind: 'unknown', tags: [] }, stale: true };
      });
    }

    function renderFavorites() {
      const ids = readList(FAV_KEY);
      if (ids.length === 0) {
        $favoritesSection.hidden = true;
        $favoritesList.innerHTML = '';
        return;
      }
      $favoritesSection.hidden = false;
      const html = entriesById(ids)
        .map((row) => entryItemHtml(row.entry, { stale: row.stale }))
        .join('');
      $favoritesList.innerHTML = html;
    }

    function renderRecent() {
      const ids = readList(RECENT_KEY);
      if (ids.length === 0) {
        $recentSection.hidden = true;
        $recentList.innerHTML = '';
        return;
      }
      $recentSection.hidden = false;
      const html = entriesById(ids)
        .map((row) => entryItemHtml(row.entry, { stale: row.stale }))
        .join('');
      $recentList.innerHTML = html;
    }

    /* ------------------------------------------------------------------ */
    /* Filter / Search                                                     */
    /* ------------------------------------------------------------------ */
    function setFilter(kind) {
      currentFilter = kind;
      document.querySelectorAll('.filter-btn').forEach((btn) => {
        const active = btn.dataset.kind === kind;
        btn.classList.toggle('active', active);
        btn.setAttribute('aria-pressed', active ? 'true' : 'false');
      });
      applyFilters();
    }

    function applyFilters() {
      const rawQuery = $searchInput.value.trim();
      const q = rawQuery.toLowerCase();
      let filtered = allEntries;
      if (currentFilter !== 'all') {
        filtered = filtered.filter((e) => {
          const kind = e && e.kind ? e.kind : (e && e.id ? String(e.id).split(':')[0] : '');
          return kind === currentFilter;
        });
      }
      if (q) {
        filtered = filtered.filter((e) => {
          const name = e && e.name ? String(e.name) : '';
          const desc = e && e.description ? String(e.description) : '';
          const tags = Array.isArray(e && e.tags) ? e.tags.join(' ') : '';
          return (name + ' ' + desc + ' ' + tags).toLowerCase().includes(q);
        });
      }
      renderEntries(filtered, { query: rawQuery, filterKind: currentFilter });
    }

    /* ------------------------------------------------------------------ */
    /* Suggest                                                             */
    /* ------------------------------------------------------------------ */
    async function runSuggest() {
      const task = $suggestInput.value.trim();
      if (!task) return;
      try {
        const res = await fetch('/api/suggest?task=' + encodeURIComponent(task));
        if (!res.ok) throw new Error('Suggest fehlgeschlagen (' + res.status + ')');
        const results = await res.json();
        $suggestResults.classList.add('active');
        if (!Array.isArray(results) || results.length === 0) {
          $suggestResults.innerHTML =
            '<p style="color:var(--text-secondary);padding:8px">Keine Vorschlaege gefunden.</p>';
          return;
        }
        const html = results.map((s) => {
          const entry = s && s.entry ? s.entry : {};
          const name = entry.name ? entry.name : '';
          const id = entry.id ? entry.id : '';
          const reason = s && s.reason ? s.reason : '';
          const rel = s && typeof s.relevance === 'number' ? s.relevance : 0;
          const relPct = Math.max(0, Math.min(100, Math.round(rel * 100)));
          return (
            '<div class="suggestion-item" role="button" tabindex="0"' +
            ' data-id="' + escHtml(id) + '"' +
            ' aria-label="Details fuer ' + escHtml(name) + ' oeffnen">' +
              '<div class="relevance-bar" role="progressbar"' +
              ' aria-valuenow="' + relPct + '" aria-valuemin="0" aria-valuemax="100">' +
                '<div class="relevance-bar-fill" style="width:' + relPct + '%"></div>' +
              '</div>' +
              '<div>' +
                '<div class="suggestion-name">' + escHtml(name) + '</div>' +
                '<div class="suggestion-reason">' + escHtml(reason) + ' (' + relPct + '%)</div>' +
              '</div>' +
            '</div>'
          );
        }).join('');
        $suggestResults.innerHTML = html;
      } catch (err) {
        showError('Suggest-Fehler: ' + (err && err.message ? err.message : String(err)));
      }
    }

    /* ------------------------------------------------------------------ */
    /* Detail-Panel (B3: Dialog mit Focus-Trap + Focus-Save/Restore)      */
    /* ------------------------------------------------------------------ */
    async function showDetail(id) {
      if (!id) return;
      // Recent-Tracking: jedes Detail-Oeffnen pusht in MRU (Dedup + Cap intern)
      pushRecent(id);
      try {
        const res = await fetch('/api/entry/' + encodeURIComponent(id));
        if (!res.ok) throw new Error('Detail fehlgeschlagen (' + res.status + ')');
        const data = await res.json();
        if (data && data.error) throw new Error(String(data.error));
        renderDetail(data);
        openDetail();
      } catch (err) {
        showError('Detail-Fehler: ' + (err && err.message ? err.message : String(err)));
      }
    }

    function renderDetail(data) {
      const entry = data && data.entry ? data.entry : {};
      const name = entry.name ? entry.name : '';
      const kind = entry.kind ? entry.kind : '';
      const scope = entry.scope ? entry.scope : '';
      const source = entry.source ? entry.source : '';
      const id = entry.id ? entry.id : '';
      const filePath = entry.filePath ? entry.filePath : '';
      const tags = Array.isArray(entry.tags) ? entry.tags : [];
      const content = data && data.content != null ? data.content : '';
      const contentStr = typeof content === 'string'
        ? content
        : JSON.stringify(content, null, 2);

      const tagsHtml = tags.map((t) => '<span class="tag">' + escHtml(t) + '</span>').join(' ');
      const fileRow = filePath
        ? '<br><strong>File:</strong> ' + escHtml(filePath)
        : '';
      const contentBlock = contentStr
        ? '<div class="detail-content">' + escHtml(contentStr) + '</div>'
        : '';

      $detailContent.innerHTML =
        '<div class="detail-title" id="detail-title">' + escHtml(name) + '</div>' +
        '<div class="detail-meta">' +
          '<strong>Kind:</strong> ' + escHtml(kind) + ' | ' +
          '<strong>Scope:</strong> ' + escHtml(scope) + ' | ' +
          '<strong>Source:</strong> ' + escHtml(source) + '<br>' +
          '<strong>Tags:</strong> ' + (tagsHtml || '<em>keine</em>') + '<br>' +
          '<strong>ID:</strong> ' + escHtml(id) +
          fileRow +
        '</div>' +
        contentBlock;
    }

    function openDetail() {
      lastTriggerElement = document.activeElement instanceof HTMLElement
        ? document.activeElement
        : null;
      $detailPanel.classList.add('open');
      $detailPanel.setAttribute('aria-hidden', 'false');
      $overlay.classList.add('open');
      $overlay.setAttribute('aria-hidden', 'false');
      // Focus auf Close-Button (erstes fokussierbares Element im Dialog)
      setTimeout(() => { $detailClose.focus(); }, 0);
    }

    function closeDetail() {
      if (!$detailPanel.classList.contains('open')) return;
      $detailPanel.classList.remove('open');
      $detailPanel.setAttribute('aria-hidden', 'true');
      $overlay.classList.remove('open');
      $overlay.setAttribute('aria-hidden', 'true');
      if (lastTriggerElement && typeof lastTriggerElement.focus === 'function') {
        lastTriggerElement.focus();
      }
      lastTriggerElement = null;
    }

    /* Focus-Trap: Tab/Shift-Tab bleibt innerhalb des offenen Panels */
    function getFocusable(container) {
      const selector = [
        'button:not([disabled])',
        'a[href]',
        'input:not([disabled])',
        'textarea:not([disabled])',
        'select:not([disabled])',
        '[tabindex]:not([tabindex="-1"])',
      ].join(',');
      return Array.from(container.querySelectorAll(selector)).filter((el) => {
        return el.offsetParent !== null || el === document.activeElement;
      });
    }

    function trapFocus(e) {
      if (!$detailPanel.classList.contains('open')) return;
      if (e.key !== 'Tab') return;
      const focusables = getFocusable($detailPanel);
      if (focusables.length === 0) {
        e.preventDefault();
        $detailClose.focus();
        return;
      }
      const first = focusables[0];
      const last = focusables[focusables.length - 1];
      if (e.shiftKey) {
        if (document.activeElement === first || !$detailPanel.contains(document.activeElement)) {
          e.preventDefault();
          last.focus();
        }
      } else {
        if (document.activeElement === last) {
          e.preventDefault();
          first.focus();
        }
      }
    }

    /* ------------------------------------------------------------------ */
    /* Event-Wiring                                                        */
    /* ------------------------------------------------------------------ */

    // Filter-Buttons (Event-Delegation)
    document.querySelector('.controls').addEventListener('click', (e) => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      setFilter(btn.dataset.kind);
    });

    // Entry-Liste Click/Keyboard (Event-Delegation, jetzt auch Stern-Toggle)
    // Stern-Click stopPropagation()-t — kein gleichzeitiges showDetail.
    function handleListClick(e) {
      // Empty-State-CTAs (Phase C-2): Filter/Search-Reset.
      const cta = e.target.closest('.empty-cta');
      if (cta) {
        const action = cta.dataset.action;
        if (action === 'reset-filter') {
          setFilter('all');
        } else if (action === 'reset-search') {
          $searchInput.value = '';
          applyFilters();
        } else if (action === 'reset-all') {
          $searchInput.value = '';
          setFilter('all');
        }
        return;
      }
      const favBtn = e.target.closest('.favorite-btn');
      if (favBtn) {
        e.stopPropagation();
        toggleFavorite(favBtn.dataset.id);
        return;
      }
      const item = e.target.closest('.entry-item');
      if (!item) return;
      // Stale-Eintraege: nicht navigieren
      if (item.classList.contains('is-stale')) return;
      showDetail(item.dataset.id);
    }
    function handleListKeydown(e) {
      if (e.key !== 'Enter' && e.key !== ' ') return;
      // Stern-Button hat eigenes natives Button-Behavior (Enter/Space toggelt) —
      // hier nur Article-Items behandeln.
      if (e.target.closest('.favorite-btn')) return;
      const item = e.target.closest('.entry-item');
      if (!item) return;
      if (item.classList.contains('is-stale')) return;
      e.preventDefault();
      showDetail(item.dataset.id);
    }
    $entryList.addEventListener('click', handleListClick);
    $entryList.addEventListener('keydown', handleListKeydown);
    $favoritesList.addEventListener('click', handleListClick);
    $favoritesList.addEventListener('keydown', handleListKeydown);
    $recentList.addEventListener('click', handleListClick);
    $recentList.addEventListener('keydown', handleListKeydown);

    // Suggest-Results Click/Keyboard (Event-Delegation)
    $suggestResults.addEventListener('click', (e) => {
      const item = e.target.closest('.suggestion-item');
      if (!item) return;
      showDetail(item.dataset.id);
    });
    $suggestResults.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter' && e.key !== ' ') return;
      const item = e.target.closest('.suggestion-item');
      if (!item) return;
      e.preventDefault();
      showDetail(item.dataset.id);
    });

    // Search mit Debounce (F7)
    $searchInput.addEventListener('input', () => {
      if (searchTimer) clearTimeout(searchTimer);
      searchTimer = setTimeout(applyFilters, 150);
    });

    // Suggest-Trigger
    $suggestBtn.addEventListener('click', runSuggest);
    $suggestInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        runSuggest();
      }
    });

    // Detail-Close + Overlay
    $detailClose.addEventListener('click', closeDetail);
    $overlay.addEventListener('click', closeDetail);

    // Keyboard: Escape schliesst Panel, Tab bleibt getrapped
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeDetail();
        return;
      }
      trapFocus(e);
    });

    // Theme-Toggle (Phase C-2 Idee #7)
    const $themeToggle = document.getElementById('theme-toggle');
    if ($themeToggle) {
      $themeToggle.addEventListener('click', toggleTheme);
    }
    // Initial: aria-label/icon an persistierten State angleichen.
    // (Das No-Flash-Inline-Script im <head> hat data-theme bereits gesetzt;
    //  hier syncen wir Icon + aria-* mit dem aktuellen Theme.)
    applyTheme(readTheme());

    // Start
    init();
  </script>
</body>
</html>
